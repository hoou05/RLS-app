services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rls
      POSTGRES_PASSWORD: rls
      POSTGRES_DB: rls_screening
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./services/api
    environment:
      DATABASE_URL: postgresql+psycopg://rls:rls@postgres:5432/rls_screening
      SECRET_KEY: dev-only-change-me
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 5173"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
    depends_on:
      - api

volumes:
  postgres_data:
